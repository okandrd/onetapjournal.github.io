<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="all" />
    <title>One Tap Journal — Privacy Policy / Gizlilik Politikası</title>
    <style>
      :root { --accent: #208aef; --text: #11181c; --muted: #60646c; --bg: #fbfbfd; --card: #f0f0f3; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      main { max-width: 640px; margin: 0 auto; padding: 64px 24px; text-align: center; }
      h1 { font-size: 28px; margin: 0 0 8px; }
      p { color: var(--muted); margin: 0 auto 32px; max-width: 460px; }
      .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      a.btn {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 14px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      a.btn.secondary { background: var(--card); color: var(--text); }
      footer { margin-top: 48px; font-size: 13px; color: var(--muted); }
      @media (prefers-color-scheme: dark) {
        :root { --text: #ecedee; --muted: #b0b4ba; --bg: #0b0b0c; --card: #1a1b1e; --accent: #4da3ff; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>One Tap Journal</h1>
      <p>Privacy Policy · Gizlilik Politikası</p>
      <div class="links">
        <a class="btn" href="./en.html">English</a>
        <a class="btn secondary" href="./tr.html">Türkçe</a>
      </div>
      <footer>Last updated · Son güncelleme: 1 June / Haziran 2026</footer>
    </main>
  </body>
</html>
